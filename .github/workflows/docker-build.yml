name: 构建并推送 ZNode Docker 镜像

on:
  workflow_dispatch:
    inputs:
      VERSION:
        description: '镜像版本号，例如 1.0.2'
        required: false
        default: '1.0.2'
      API_URL:
        description: '前端运行时 API 地址'
        required: false
        default: 'http://backend:3002'
      BUILD_TARGET:
        description: '前端/后端/全部'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - frontend
          - backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------
      # 检查源码默认 API_URL 并替换为占位符
      - name: 替换前端源码默认 API_URL
        if: contains(github.event.inputs.BUILD_TARGET, 'frontend') || contains(github.event.inputs.BUILD_TARGET, 'all')
        run: |
          echo "查找源码中默认 API_URL 并替换为占位符 __API_URL__"
          FOUND=$(grep -Rn "http://localhost:3002" ./src || true)
          if [ -n "$FOUND" ]; then
            echo "发现默认 URL，需要替换为占位符:"
            echo "$FOUND"
            grep -Rl "http://localhost:3002" ./src | xargs sed -i "s|http://localhost:3002|__API_URL__|g"
          else
            echo "✅ 源码中未发现默认 URL"
          fi

      # ------------------------------
      # 构建前端镜像
      - name: 构建前端镜像
        if: contains(github.event.inputs.BUILD_TARGET, 'frontend') || contains(github.event.inputs.BUILD_TARGET, 'all')
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg VITE_API_URL=${{ github.event.inputs.API_URL }} \
            -t ghcr.io/${{ github.repository_owner }}/znode-frontend:${{ github.event.inputs.VERSION }} \
            -t ghcr.io/${{ github.repository_owner }}/znode-frontend:latest \
            -f docker/Dockerfile.frontend \
            . \
            --push

      # ------------------------------
      # 构建后端镜像
      - name: 构建后端镜像
        if: contains(github.event.inputs.BUILD_TARGET, 'backend') || contains(github.event.inputs.BUILD_TARGET, 'all')
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ghcr.io/${{ github.repository_owner }}/znode-backend:${{ github.event.inputs.VERSION }} \
            -t ghcr.io/${{ github.repository_owner }}/znode-backend:latest \
            -f docker/Dockerfile.backend \
            $GITHUB_WORKSPACE \
            --push
