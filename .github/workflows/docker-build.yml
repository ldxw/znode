name: 构建并推送 ZNode Docker 镜像

on:
  workflow_dispatch:
    inputs:
      VERSION:
        description: '镜像版本号，例如 1.0.2'
        required: false
        default: '1.0.2'
      TARGET:
        description: '选择构建目标'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - frontend
          - backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 QEMU 多架构支持
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR（GitHub Container Registry）
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------
      # 构建前端镜像
      - name: 构建前端镜像
        if: ${{ github.event.inputs.TARGET == 'all' || github.event.inputs.TARGET == 'frontend' }}
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg VITE_API_URL=http://backend:3002 \
            -t ghcr.io/${{ github.repository_owner }}/znode-frontend:${{ github.event.inputs.VERSION }} \
            -t ghcr.io/${{ github.repository_owner }}/znode-frontend:latest \
            -f docker/Dockerfile.frontend \
            . \
            --push

      # ------------------------------
      # 构建后端镜像
      - name: 构建后端镜像
        if: ${{ github.event.inputs.TARGET == 'all' || github.event.inputs.TARGET == 'backend' }}
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ghcr.io/${{ github.repository_owner }}/znode-backend:${{ github.event.inputs.VERSION }} \
            -t ghcr.io/${{ github.repository_owner }}/znode-backend:latest \
            -f backend/Dockerfile.backend \
            backend/ \
            --push
