name: 构建并推送 ZNode Docker 镜像

on:
  workflow_dispatch:
    inputs:
      VERSION:
        description: '镜像版本号，例如 1.0.2'
        required: false
        default: '1.0.2'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ldxw/znode

    steps:
      # ------------------------------
      - name: 检出代码
        uses: actions/checkout@v3

      # ------------------------------
      - name: 设置 QEMU 多架构支持
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ------------------------------
      - name: 登录 GHCR（GitHub Container Registry）
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------
      # 构建前端镜像
      - name: 构建前端镜像
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg VITE_API_URL=http://backend:3000 \
            -t ghcr.io/${{ github.repository_owner }}/znode-frontend:${{ github.event.inputs.VERSION }} \
            -t ghcr.io/${{ github.repository_owner }}/znode-frontend:latest \
            -f docker/Dockerfile.frontend \
            . \
            --push

      # ------------------------------
      # 构建后端镜像
      - name: 构建后端镜像
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ghcr.io/${{ github.repository_owner }}/znode-backend:${{ github.event.inputs.VERSION }} \
            -t ghcr.io/${{ github.repository_owner }}/znode-backend:latest \
            -f docker/Dockerfile.backend \
            . \
            --push

      # ------------------------------
      # 推送 GHCR 镜像
      - name: 推送前端镜像到 GHCR
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/znode-frontend:${{ github.event.inputs.VERSION }}
          docker push ghcr.io/${{ github.repository_owner }}/znode-frontend:latest

      - name: 推送后端镜像到 GHCR
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/znode-backend:${{ github.event.inputs.VERSION }}
          docker push ghcr.io/${{ github.repository_owner }}/znode-backend:latest

      # ------------------------------
      # 可选：推送到 Docker Hub / 阿里云镜像（注释）
      # - name: 登录 Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}
      #
      # - name: 推送镜像到 Docker Hub
      #   run: |
      #     docker tag ghcr.io/${{ github.repository_owner }}/znode-frontend:${{ github.event.inputs.VERSION }} $IMAGE_NAME-frontend:${{ github.event.inputs.VERSION }}
      #     docker tag ghcr.io/${{ github.repository_owner }}/znode-backend:${{ github.event.inputs.VERSION }} $IMAGE_NAME-backend:${{ github.event.inputs.VERSION }}
      #     docker push $IMAGE_NAME-frontend:${{ github.event.inputs.VERSION }}
      #     docker push $IMAGE_NAME-backend:${{ github.event.inputs.VERSION }}
